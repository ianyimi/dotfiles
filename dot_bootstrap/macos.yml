---
- name: Prerequisites (Git, Brew, GitHub Auth)
  hosts: localhost
  become: false
  connection: local
  tasks:
    # Stale Command Line Tools cause source-built formulas (rust, llvm,
    # python@3.14, omlx …) to fail mid-install with a confusing error. Catch
    # it here so the playbook stops with clear remediation instead of failing
    # 200 tasks deep. `brew doctor` is the cheapest reliable signal.
    - name: Detect outdated Xcode Command Line Tools
      ansible.builtin.shell: |
        set -o pipefail
        brew doctor 2>&1 | grep -iE 'Command Line Tools are too outdated' || true
      args:
        executable: /bin/bash
      register: clt_outdated_check
      changed_when: false
      failed_when: false

    - name: Fail with clear remediation if CLT is too outdated for current Homebrew
      ansible.builtin.fail:
        msg: |
          Your Xcode Command Line Tools are too old for the current Homebrew.
          Source-built formulas (rust, llvm, python, omlx …) will fail.

          Fix interactively (GUI prompt + ~5–10 min download), then re-run apConfig:

            sudo rm -rf /Library/Developer/CommandLineTools
            sudo xcode-select --install

          Verify after install:
            brew doctor 2>&1 | grep -i 'command line' || echo OK
      when: clt_outdated_check.stdout | length > 0

    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check

    - name: Install Homebrew if not present
      ansible.builtin.shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: not homebrew_check.stat.exists

    - name: Ensure git is installed
      community.general.homebrew:
        name: git
        state: present

    - name: Configure git with GitHub token from Bitwarden
      block:
        - name: Check if gh CLI is installed
          ansible.builtin.command: which gh
          register: gh_check
          failed_when: false
          changed_when: false

        - name: Install gh CLI if not present
          community.general.homebrew:
            name: gh
            state: present
          when: gh_check.rc != 0

        - name: Check if gh is authenticated
          ansible.builtin.command: gh auth status
          register: gh_auth_status
          failed_when: false
          changed_when: false

        - name: Authenticate gh with Bitwarden token
          ansible.builtin.shell: |
            bw get password "GitHub Personal Access Token" | gh auth login --with-token
          environment:
            BW_SESSION: "{{ lookup('env', 'BW_SESSION') }}"
            NODE_OPTIONS: "--no-deprecation"
          when:
            - gh_auth_status.rc != 0
            - lookup('env', 'BW_SESSION') | length > 0
          timeout: 30
          no_log: true

        - name: Warn if gh not authenticated and no BW_SESSION
          ansible.builtin.debug:
            msg: "Skipping gh auth - BW_SESSION not set. Run 'bw-session-check && source ~/.bw-session' then re-run."
          when:
            - gh_auth_status.rc != 0
            - lookup('env', 'BW_SESSION') | length == 0

- name: Machine setup (MacOS)
  hosts: localhost
  become: true
  connection: local
  vars:
    flyctl_version: "0.1.130"
    pulumi_version: "v3.94.2"
  tasks:
    - name: Get my user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Determine the path to zsh
      ansible.builtin.shell: "command -v zsh"
      register: zsh_path
      changed_when: false

    - name: Ensure zsh is installed
      become: false
      ansible.builtin.package:
        name: zsh
        state: present

    - name: Change shell to zsh
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        shell: "{{ zsh_path.stdout }}"
      when: zsh_path.stdout != ""

