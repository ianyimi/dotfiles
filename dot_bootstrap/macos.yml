- name: Brew Install (CLI)
  hosts: localhost
  become: false
  environment:
    HOMEBREW_NO_ANALYTICS: "1"
  vars:
    brew_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
  tasks:
    - name: Tap sst/tap (required for opencode)
      become: true
      become_user: "{{ brew_user }}"
      community.general.homebrew_tap:
        name: sst/tap
        state: present

    # oMLX — LLM inference server with continuous batching & SSD caching for
    # Apple Silicon. https://github.com/jundot/omlx
    #
    # We install the standalone macOS .dmg app, NOT the brew formula. Reasons:
    #
    #   1. The brew formula `jundot/omlx/omlx` bootstraps a venv against brew's
    #      `python@3.11`, which is broken on macOS 26 due to an Apple SDK /
    #      runtime libexpat 2.7.1-vs-2.7.2 symbol skew. See KNOWN_ISSUES.md.
    #      Will resurface for ANY formula that builds pyexpat until Apple ships
    #      libexpat 2.7.2 in a point-update.
    #   2. The DMG ships its own bundled Python + expat, sidestepping the
    #      entire toolchain hell.
    #   3. The CLI command `omlx` is the ONLY thing the brew variant adds.
    #      The server, admin dashboard, KV cache, API compat — everything we
    #      actually use — is identical in the app.
    #   4. Built-in Sparkle auto-update means `brew upgrade omlx` isn't needed.
    #
    # Once upstream fixes the python@3.11 bottle, we can re-add the formula
    # task alongside this one if we ever want the CLI back.
    - name: Install oMLX (macOS app from GitHub releases)
      become: false
      block:
        - name: Check whether oMLX.app is already installed
          ansible.builtin.stat:
            path: /Applications/oMLX.app
          register: omlx_app_stat

        - name: Get current macOS major version (for asset selection)
          ansible.builtin.shell: sw_vers -productVersion | cut -d. -f1
          register: macos_major
          changed_when: false
          when: not omlx_app_stat.stat.exists

        - name: Query GitHub for the latest oMLX release
          ansible.builtin.uri:
            url: https://api.github.com/repos/jundot/omlx/releases/latest
            return_content: true
            headers:
              Accept: application/vnd.github+json
          register: omlx_release
          when: not omlx_app_stat.stat.exists

        - name: Select the DMG asset matching this macOS major version
          ansible.builtin.set_fact:
            omlx_dmg_url: >-
              {{
                (omlx_release.json.assets
                  | selectattr('name', 'match', '.*macos' ~ macos_major.stdout ~ '-.*\.dmg$')
                  | list
                  | first).browser_download_url
              }}
            omlx_dmg_name: >-
              {{
                (omlx_release.json.assets
                  | selectattr('name', 'match', '.*macos' ~ macos_major.stdout ~ '-.*\.dmg$')
                  | list
                  | first).name
              }}
          when: not omlx_app_stat.stat.exists

        - name: Fail clearly if no matching DMG exists for this macOS version
          ansible.builtin.fail:
            msg: |
              No oMLX DMG asset matched 'macos{{ macos_major.stdout }}-*.dmg'
              in release {{ omlx_release.json.tag_name }}. Available assets:
              {{ omlx_release.json.assets | map(attribute='name') | list }}
              Either wait for upstream to ship a build for your macOS, or use
              an older release.
          when:
            - not omlx_app_stat.stat.exists
            - omlx_dmg_url is not defined or (omlx_dmg_url | length) == 0

        - name: Download oMLX DMG
          ansible.builtin.get_url:
            url: "{{ omlx_dmg_url | trim }}"
            dest: "/tmp/{{ omlx_dmg_name | trim }}"
            mode: "0644"
            timeout: 300
          when: not omlx_app_stat.stat.exists

        - name: Mount oMLX DMG
          ansible.builtin.command: hdiutil attach "/tmp/{{ omlx_dmg_name | trim }}" -nobrowse -quiet -mountpoint /Volumes/oMLX-install
          when: not omlx_app_stat.stat.exists
          changed_when: true

        - name: Copy oMLX.app to /Applications
          # `cp -R` preserves codesignature; `ditto` would also work. Either is
          # fine since the bundle is Developer-ID signed by the publisher.
          ansible.builtin.command: cp -R /Volumes/oMLX-install/oMLX.app /Applications/oMLX.app
          when: not omlx_app_stat.stat.exists
          changed_when: true

        - name: Unmount oMLX DMG
          ansible.builtin.command: hdiutil detach /Volumes/oMLX-install -quiet
          when: not omlx_app_stat.stat.exists
          changed_when: true
          failed_when: false

        - name: Remove downloaded DMG
          ansible.builtin.file:
            path: "/tmp/{{ omlx_dmg_name | trim }}"
            state: absent
          when: not omlx_app_stat.stat.exists

        - name: Report installed oMLX version
          ansible.builtin.command: /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" /Applications/oMLX.app/Contents/Info.plist
          register: omlx_installed_version
          changed_when: false
          failed_when: false

        - name: Show installed oMLX version
          ansible.builtin.debug:
            msg: "oMLX.app installed: v{{ omlx_installed_version.stdout | default('unknown') }}"

    - name: Install opencode (from sst/tap)
      become: true
      become_user: "{{ brew_user }}"
      community.general.homebrew:
        name: sst/tap/opencode
        state: present
        update_homebrew: true

    - name: Tap imsg
      become: true
      become_user: "{{ brew_user }}"
      community.general.homebrew_tap:
        name: steipete/tap
        state: present

    - name: Install imsg
      become: true
      become_user: "{{ brew_user }}"
      community.general.homebrew:
        name: steipete/tap/imsg
        state: present

    - name: Check Install - Git
      community.general.homebrew:
        name: git
        state: present

    - name: Check Install - k6
      community.general.homebrew:
        name: k6
        state: present

    - name: Check if Claude Code is installed
      ansible.builtin.command: which claude
      register: claude_code_check
      failed_when: false
      changed_when: false

    - name: Install Claude Code (native install with auto-updates)
      ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
      when: claude_code_check.rc != 0

    - name: Check Install - Bat
      community.general.homebrew:
        name: bat
        state: present

    - name: Check Install - Zsh AutoSuggestions
      community.general.homebrew:
        name: zsh-autosuggestions
        state: present

    - name: Check Install - Zsh Syntax Highlighting
      community.general.homebrew:
        name: zsh-syntax-highlighting
        state: present

    - name: Check Install - fzf
      community.general.homebrew:
        name: fzf
        state: present

    # - name: Check Install - Corepack
    #   community.general.homebrew:
    #     name: corepack
    #     state: present

    - name: Check Install - Starship
      community.general.homebrew:
        name: starship
        state: present

    - name: Check Install - Luarocks
      community.general.homebrew:
        name: luarocks
        state: present

    - name: Check Install - Lunajson
      ansible.builtin.command: luarocks install lunajson

    - name: Check Install - pnpm
      block:
        - name: Check if pnpm is already installed
          ansible.builtin.command: pnpm --version
          register: pnpm_check
          failed_when: false
          changed_when: false

        - name: Debug pnpm installation status
          ansible.builtin.debug:
            msg: "pnpm is already installed, version: {{ pnpm_check.stdout }}"
          when: pnpm_check.rc == 0

        - name: Install pnpm if not installed
          ansible.builtin.shell: "curl -fsSL https://get.pnpm.io/install.sh | sh -"
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm"
          environment:
            PNPM_HOME: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm"
          when: pnpm_check.rc != 0

        - name: Ensure pnpm is in the PATH
          ansible.builtin.lineinfile:
            path: ~/.zshrc
            line: 'export PATH="$HOME/.local/share/pnpm:$PATH"'
            insertafter: EOF
            state: present
          when: pnpm_check.rc != 0

        - name: Reload shell configuration
          ansible.builtin.shell: source ~/.zshrc
          args:
            executable: /bin/zsh
          when: pnpm_check.rc != 0

    - name: Check Install - Neovim
      community.general.homebrew:
        name: neovim
        state: latest

    - name: Check Install - node.js
      community.general.homebrew:
        name: node
        state: present

    - name: Check Install - eslint_d (fast eslint daemon for neovim)
      community.general.npm:
        name: eslint_d
        global: true
        state: present

    - name: Check Install - prettierd (fast prettier daemon for neovim)
      community.general.npm:
        name: "@fsouza/prettierd"
        global: true
        state: present

    - name: Check Install - GitHub CLI
      community.general.homebrew:
        name: gh
        state: present

    - name: Ensure GitHub Dash extension is installed
      block:
        - name: Check if GitHub Dash extension is installed
          command: gh extension list --version
          register: gh_dash_version
          changed_when: false
          ignore_errors: true

        - name: Install GitHub Dash extension if not present
          command: gh extension install dlvhdr/gh-dash
          when: gh_dash_version.rc != 0

    - name: Check Install - Tmux
      community.general.homebrew:
        name: tmux
        state: present

    - name: Check Install - Tmuxinator
      community.general.homebrew:
        name: tmuxinator
        state: present

    - name: Check Install - Neofetch
      community.general.homebrew:
        name: neofetch
        state: present

    - name: Check Install - curl
      community.general.homebrew:
        name: npm
        state: present

    - name: Check Install - HandBrakeCLI
      community.general.homebrew:
        name: handbrake
        state: present

    - name: Check Install - lazydocker
      community.general.homebrew:
        name: lazydocker
        state: present

    - name: Check Install - lazygit
      community.general.homebrew:
        name: lazygit
        state: present

    - name: Check Install - kubectl
      community.general.homebrew:
        name: kubectl
        state: present

    - name: Check Install - Mongosh
      community.general.homebrew:
        name: mongosh
        state: present

    - name: Check Install - Argon2
      community.general.homebrew:
        name: argon2
        state: present

    - name: Check Install - Azure CLI
      community.general.homebrew:
        name: azure-cli
        state: present

    - name: Check Install - k9s
      community.general.homebrew:
        name: k9s
        state: present

    - name: Check Install - npm
      community.general.homebrew:
        name: npm
        state: present

    - name: Check Install - fnm
      community.general.homebrew:
        name: fnm
        state: present

    - name: Check Install - RipGrep
      community.general.homebrew:
        name: ripgrep
        state: present

    - name: Check Install - Pi Coding Agent
      block:
        - name: Install Pi Coding Agent
          community.general.homebrew:
            name: pi-coding-agent
            state: latest

        - name: Wait for pi command to be available
          ansible.builtin.command: which pi
          register: pi_check
          retries: 3
          delay: 2
          until: pi_check.rc == 0
          changed_when: false

        # Removed: pi-powerline-footer (using local combined vim-powerline extension)

        - name: Install Pi BTW extension
          ansible.builtin.shell: pi install npm:pi-btw
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/extensions/pi-btw"

        - name: Install Pi DocParser extension
          ansible.builtin.shell: pi install npm:pi-docparser
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/extensions/pi-docparser"

        - name: Install Pi Image Preview extension (fork with space support)
          ansible.builtin.shell: pi install git:https://github.com/ianyimi/pi-image-preview
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/git/github.com/ianyimi/pi-image-preview"

        - name: Install LSP Pi extension
          ansible.builtin.shell: pi install npm:lsp-pi
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/extensions/lsp-pi"

        - name: Install Browser Annotations Pi extension
          ansible.builtin.shell: pi install npm:@browser-annotations/pi
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/extensions/@browser-annotations/pi"

        - name: Install Browser Annotations Chrome DevTools extension
          # Installs the companion Chrome extension that exposes the "Feedback" tab
          # in DevTools. Required for @browser-annotations/pi to receive anything.
          # Interactive: may prompt to open Chrome Web Store or load unpacked.
          # Safe to re-run — the installer handles the already-installed case.
          ansible.builtin.shell: npx --yes browser-annotations@latest
          register: browser_annotations_chrome
          changed_when: false
          failed_when: false
          environment:
            PATH: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm:{{ ansible_facts['env']['PATH'] }}"

        - name: Show Browser Annotations Chrome installer output
          ansible.builtin.debug:
            msg: "{{ browser_annotations_chrome.stdout_lines | default([]) }}"
          when: browser_annotations_chrome.stdout is defined

        - name: Install Pi Smart Fetch extension
          ansible.builtin.shell: pi install npm:pi-smart-fetch
          args:
            creates: "{{ ansible_facts['env']['HOME'] }}/.pi/extensions/pi-smart-fetch"

        # Removed: pi-vim (using local combined vim-powerline extension)

    - name: Check Install - RTK
      community.general.homebrew:
        name: rtk
        state: present

    - name: Set Dock to auto-hide
      become: false
      shell: "defaults write com.apple.dock autohide -bool true && killall Dock"
      changed_when: false

    - name: Tap FelixKratz formulae
      become: false
      community.general.homebrew_tap:
        name: FelixKratz/formulae
        state: present

    - name: JankyBorders
      become: false
      community.general.homebrew:
        name: borders
        state: present

    - name: Check Install - Hack Nerd Font
      become: false
      community.general.homebrew_cask:
        name: font-hack-nerd-font
        state: present

    - name: Check Install - JetBrains Mono Nerd Font
      become: false
      community.general.homebrew_cask:
        name: font-jetbrains-mono-nerd-font
        state: present

    - name: Check if JankyBorders is running
      become: false
      shell: "pgrep -x borders"
      register: borders_status
      failed_when: false
      changed_when: false

    - name: Start JankyBorders if not running
      become: false
      shell: "borders active_color=0xffff0000 inactive_color=0x00000000 width=10.0 &"
      when: borders_status.rc != 0

    - name: Check Install - SketchyBar
      become: false
      ignore_errors: true
      community.general.homebrew:
        name: sketchybar
        state: present

    - name: Check if SbarLua is installed
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/share/sketchybar_lua/sketchybar.so"
      register: sbarlua_stat

    - name: Clone SbarLua repository
      when: not sbarlua_stat.stat.exists
      ansible.builtin.git:
        repo: "https://github.com/FelixKratz/SbarLua.git"
        dest: "/tmp/SbarLua"
        version: "HEAD"
        force: yes

    - name: Build and install SbarLua
      when: not sbarlua_stat.stat.exists
      ansible.builtin.shell: "make install"
      args:
        chdir: "/tmp/SbarLua"

    - name: Start SketchyBar service
      become: false
      shell: "brew services start sketchybar"
      register: sketchybar_service
      changed_when: "'Successfully started' in sketchybar_service.stdout"
      failed_when: false

    - name: Set menu bar to auto-hide
      become: false
      shell: 'osascript -e ''tell application "System Events" to tell dock preferences to set autohide menu bar to true'''
      changed_when: false

- name: Clone SketchyBar App Font Repository
  hosts: localhost
  become: false
  tasks:
    - name: Ensure packages directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/packages"
        state: directory
        mode: "0755"

    - name: Check if sketchybar-app-font repository exists
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font"
      register: sketchybar_app_font_stat

    - name: Clone sketchybar-app-font repository
      ignore_errors: true
      ansible.builtin.git:
        repo: "https://github.com/kvndrsslr/sketchybar-app-font.git"
        dest: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font"
        version: "HEAD"
        force: no
      when: not sketchybar_app_font_stat.stat.exists

- name: Update SketchyBar App Font
  hosts: localhost
  become: false
  tasks:
    - name: Check if sketchybar-app-font dist exists
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font/dist/icon_map.lua"
      register: sketchybar_dist_stat

    - name: Update sketchybar-app-font dependencies
      when: not sketchybar_dist_stat.stat.exists
      ansible.builtin.command: pnpm install
      args:
        chdir: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font"
      environment:
        PATH: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm:{{ ansible_facts['env']['PATH'] }}"

    - name: Ensure sketchybar scripts directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/sketchybar/scripts"
        state: directory
        mode: "0755"

    - name: Ensure my-script.sh exists with icon map markers
      ansible.builtin.copy:
        dest: "{{ ansible_facts['env']['HOME'] }}/.config/sketchybar/scripts/my-script.sh"
        content: |
          ### START-OF-ICON-MAP
          # Here be the function
          ### END-OF-ICON-MAP
        mode: "0755"
        force: no

    - name: Build and install latest sketchybar-app-font and update icon map script
      when: not sketchybar_dist_stat.stat.exists
      ansible.builtin.command: pnpm run build:install "{{ ansible_facts['env']['HOME'] }}/.config/sketchybar/scripts/my-script.sh"
      args:
        chdir: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font"
      environment:
        PATH: "{{ ansible_facts['env']['HOME'] }}/.local/share/pnpm:{{ ansible_facts['env']['PATH'] }}"

- name: Generate app_icons.lua file from icon_map.lua in dist folder
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Check if icon_map.lua exists in dist
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font/dist/icon_map.lua"
      register: icon_map_stat

    - name: Ensure ~/.config/sketchybar/helpers directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.config/sketchybar/helpers"
        state: directory
        mode: "0755"

    - name: Copy icon_map.lua to app_icons.lua in helpers folder
      when: icon_map_stat.stat.exists
      ansible.builtin.copy:
        src: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font/dist/icon_map.lua"
        dest: "{{ ansible_facts['env']['HOME'] }}/.config/sketchybar/helpers/app_icons.lua"
        mode: "0644"

    - name: Ensure user Fonts directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/Library/Fonts"
        state: directory
        mode: "0755"

    - name: Install sketchybar-app-font TTF
      when: icon_map_stat.stat.exists
      ansible.builtin.copy:
        src: "{{ ansible_facts['env']['HOME'] }}/packages/sketchybar-app-font/dist/sketchybar-app-font.ttf"
        dest: "{{ ansible_facts['env']['HOME'] }}/Library/Fonts/sketchybar-app-font.ttf"
        mode: "0644"

    - name: Restart SketchyBar to apply new icon configurations
      ansible.builtin.shell: "brew services restart sketchybar"

