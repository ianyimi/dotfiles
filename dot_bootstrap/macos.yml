- name: Install and Start Aerospace (last - so borders config loads properly)
  hosts: localhost
  become: false
  gather_facts: false
  environment:
    HOMEBREW_NO_ANALYTICS: "1"
  tasks:
    - name: Check Install - Aerospace
      community.general.homebrew_cask:
        name:
          - nikitabobko/tap/aerospace
        state: latest
      ignore_errors: true

    - name: Check if Aerospace is running
      shell: "pgrep -f 'Aerospace'"
      register: aerospace_status
      failed_when: false
      changed_when: false

    - name: Start Aerospace if not running
      shell: "open -a AeroSpace"
      when: aerospace_status.rc != 0
      ignore_errors: true

- name: Stabilize Accessibility code-signing (sketchybar, aerospace)
  # Re-signs ad-hoc / unstable Homebrew binaries with a stable self-signed
  # identity (`zaye-codesign`) so macOS TCC accessibility grants survive
  # `brew upgrade`. See ~/.local/bin/resign-accessibility-binaries for the
  # one-time keychain setup.
  hosts: localhost
  become: false
  gather_facts: false
  tasks:
    - name: Check for zaye-codesign identity in login keychain
      ansible.builtin.shell: |
        set -o pipefail
        security find-identity -p codesigning -v | grep -q ' "zaye-codesign"'
      args:
        executable: /bin/bash
      register: codesign_identity_check
      failed_when: false
      changed_when: false

    - name: Warn if zaye-codesign identity is missing
      ansible.builtin.debug:
        msg: |
          ⚠  Self-signed identity 'zaye-codesign' not found in login keychain.
             Accessibility permissions for sketchybar/aerospace will keep being
             invalidated on every `brew upgrade` until you create it.

             One-time setup (cannot be scripted):
               1. Open Keychain Access.
               2. Menu → Certificate Assistant → Create a Certificate…
               3. Name: zaye-codesign
                  Identity Type: Self Signed Root
                  Certificate Type: Code Signing
                  (tick "Let me override defaults", validity ~3650 days)
               4. In the login keychain, double-click the new cert →
                  Trust → Code Signing → Always Trust.
               5. Re-run apConfig.
      when: codesign_identity_check.rc != 0

    - name: Ensure resign LaunchAgent is bootstrapped into the GUI session
      ansible.builtin.shell: |
        set -e
        LABEL="net.zaye.resign-accessibility"
        PLIST="$HOME/Library/LaunchAgents/$LABEL.plist"
        UID_VAL=$(id -u)
        if [ ! -f "$PLIST" ]; then
          echo "plist-missing" >&2
          exit 0
        fi
        if launchctl print "gui/$UID_VAL/$LABEL" >/dev/null 2>&1; then
          echo "already-loaded"
        else
          launchctl bootstrap "gui/$UID_VAL" "$PLIST"
          echo "bootstrapped"
        fi
      args:
        executable: /bin/bash
      register: resign_agent_load
      changed_when: "'bootstrapped' in resign_agent_load.stdout"
      failed_when: false

    - name: Re-sign sketchybar and aerospace with stable identity
      # Runs the same script the LaunchAgent runs. Idempotent: skips binaries
      # that are already signed with the correct identity + identifier.
      ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/resign-accessibility-binaries"
      register: resign_run
      changed_when: "'sign:' in resign_run.stdout"
      failed_when: false
      when: codesign_identity_check.rc == 0

    - name: Show resign script output
      ansible.builtin.debug:
        msg: "{{ resign_run.stdout_lines | default([]) }}"
      when: resign_run.stdout is defined and resign_run.stdout | length > 0

    - name: Report current signing state for verification
      ansible.builtin.shell: |
        for b in /opt/homebrew/bin/sketchybar /opt/homebrew/bin/aerospace; do
          if [ -e "$b" ]; then
            printf '%s\n' "--- $b ---"
            codesign -dv "$b" 2>&1 | grep -E '^(Authority|Identifier|Signature)='
          fi
        done
      args:
        executable: /bin/bash
      register: resign_verify
      changed_when: false
      failed_when: false

    - name: Show post-resign signature info
      ansible.builtin.debug:
        msg: "{{ resign_verify.stdout_lines | default([]) }}"
